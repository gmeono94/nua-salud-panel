services:
  postgres:
    image: postgres:16-alpine
    container_name: nua-salud-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nua
      POSTGRES_PASSWORD: nua_secret
      POSTGRES_DB: nua_salud
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
