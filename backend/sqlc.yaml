version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/core/db/queries/"
    schema: "./internal/core/db/schema/"
    gen:
      go:
        package: "nuasqlc"
        out: "./internal/core/db/nuasqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
